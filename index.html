<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Tracker</title>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8FAFC;color:#1E293B;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.header{background:#fff;border-bottom:1px solid #E2E8F0;padding:14px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-title{font-size:17px;font-weight:700;color:#0F172A}
.header-sub{font-size:12px;color:#94A3B8;margin-top:1px}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid #E2E8F0;background:#fff;color:#475569;transition:background 0.15s}
.btn:hover{background:#F1F5F9}
.btn-primary{background:#0F172A;color:#fff;border:none}
.btn-primary:hover{background:#1E293B}
.btn-danger{border-color:#FEE2E2;background:#FFF5F5;color:#DC2626}
.btn-archive{color:#6366F1}
.btn-restore{background:#EEF2FF;color:#4338CA;border-color:#C7D2FE}
.btn-dashed{border:1px dashed #CBD5E1;background:transparent;color:#64748B}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.input,.select{padding:6px 10px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px;outline:none;font-family:inherit;background:#fff}
.input:focus{border-color:#6366F1;box-shadow:0 0 0 2px rgba(99,102,241,0.1)}
.select{cursor:pointer;color:#64748B;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-dot{width:6px;height:6px;border-radius:50%}
.order-card{background:#fff;border-radius:12px;margin-bottom:8px;border:1px solid #E2E8F0;overflow:hidden}
.order-card.expanded{border-color:#CBD5E1;border-width:1.5px}
.order-header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
.order-header:hover{background:#FAFBFC}
.order-chevron{font-size:18px;transition:transform 0.2s;color:#94A3B8}
.order-chevron.open{transform:rotate(90deg)}
.order-id{font-size:11px;font-weight:600;color:#94A3B8;font-family:monospace}
.order-customer{font-size:14px;font-weight:600;color:#0F172A}
.order-meta{font-size:11px;color:#94A3B8;margin-top:2px}
.order-notes{padding:8px 16px;background:#FFFBEB;font-size:12px;color:#92400E;border-bottom:1px solid #F1F5F9}
.order-actions{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;background:#FAFBFC}
.item-row{padding:10px 16px;border-bottom:1px solid #F8FAFC;display:flex;align-items:center;gap:10px}
.item-row.selected{background:#F8FAFF}
.item-thumb{width:64px;height:64px;border-radius:8px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;color:#1E293B}
.item-desc{font-size:11px;color:#94A3B8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-units{font-size:13px;font-weight:600;color:#475569;text-align:right;min-width:44px;padding:2px 6px;border-radius:6px;cursor:pointer}
.item-units:hover{background:#F1F5F9}
.item-units-label{font-size:10px;color:#94A3B8;font-weight:400}
.item-units-input{width:52px;padding:2px 6px;border-radius:6px;border:1px solid #6366F1;background:#EEF2FF;font-size:12px;text-align:right;outline:none;font-family:inherit}
.item-select{padding:4px 6px;border-radius:6px;border:1px solid #E2E8F0;font-size:10px;cursor:pointer;font-family:inherit;outline:none;max-width:95px;background:#FAFBFC}
.item-status{padding:4px 6px;border-radius:6px;border:1px solid #E2E8F0;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;outline:none}
.item-delete{background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:16px;padding:2px}
.item-delete:hover{color:#EF4444}
.select-all{padding:6px 16px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:8px}
.select-all label{font-size:10px;color:#94A3B8;font-weight:600;cursor:pointer}
.bulk-bar{background:#1E293B;padding:8px 24px}
.bulk-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bulk-label{font-size:12px;color:#F8FAFC;font-weight:600}
.img-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:2000;cursor:pointer}
.img-popup-overlay img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.img-popup-close{position:fixed;top:20px;right:24px;color:#fff;font-size:32px;cursor:pointer;line-height:1;opacity:0.8}
.img-popup-close:hover{opacity:1}
.bulk-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#F8FAFC;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.bulk-clear{margin-left:auto;background:none;border:none;color:#94A3B8;font-size:11px;cursor:pointer;font-family:inherit}
.view-toggle{display:flex;border-radius:8px;border:1px solid #E2E8F0;overflow:hidden}
.view-toggle button{padding:6px 10px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-transform:capitalize;background:#fff;color:#94A3B8}
.view-toggle button.active{background:#F1F5F9;color:#0F172A}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.4);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:16px;width:94%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal.wide{max-width:680px}
.modal:not(.wide){max-width:520px}
.modal-body{padding:24px}
.modal-title{font-size:17px;font-weight:700;color:#0F172A;margin-bottom:4px}
.modal-sub{font-size:12px;color:#94A3B8;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.field{margin-bottom:14px}
.field-label{display:block;font-size:11px;font-weight:600;color:#64748B;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.field-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #E2E8F0;font-size:13px;font-family:inherit;outline:none;background:#FAFBFC;box-sizing:border-box}
.field-input:focus{border-color:#6366F1}
.tab-bar{display:flex;gap:6px;margin-bottom:18px}
.tab-btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-transform:capitalize;border:1px solid #E2E8F0;background:#fff;color:#64748B}
.tab-btn.active{border-color:#6366F1;background:#EEF2FF;color:#4338CA}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #F1F5F9}
.dropzone{border:2px dashed #CBD5E1;border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;background:#FAFBFC}
.dropzone:hover{border-color:#6366F1}
.map-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.map-label{width:110px;font-size:12px;font-weight:600;color:#64748B}
.map-select{flex:1;padding:7px 10px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;border:1px solid #E2E8F0;background:#FAFBFC}
.map-select.mapped{border-color:#86EFAC;background:#F0FDF4}
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{padding:8px 12px;text-align:left;font-weight:600;color:#64748B;font-size:11px;background:#F8FAFC}
.preview-table td{padding:7px 12px;border-top:1px solid #F1F5F9}
.success-banner{background:#F0FDF4;border-radius:8px;padding:8px 12px;font-size:12px;color:#15803D;margin-bottom:14px}
.error-banner{background:#FEF2F2;border-radius:8px;padding:8px 12px;font-size:12px;color:#DC2626;margin-top:10px}
.container{max-width:920px;margin:0 auto;padding:16px 16px 40px}
.checkbox{width:14px;height:14px;cursor:pointer;accent-color:#6366F1;flex-shrink:0}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #E2E8F0;border-top-color:#6366F1;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.login-title{font-size:24px;font-weight:700;color:#0F172A}
.login-sub{font-size:14px;color:#94A3B8}
.login-btn{padding:12px 32px;border-radius:10px;border:none;background:#0F172A;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:10px}
.login-btn:hover{background:#1E293B}
.demo-banner{background:#FEF3C7;padding:6px 24px;text-align:center;font-size:12px;color:#92400E;border-bottom:1px solid #FDE68A}
.demo-banner a{color:#92400E;text-decoration:underline}
.user-info{font-size:11px;color:#94A3B8;cursor:pointer}
.user-info:hover{color:#64748B}
.order-id-edit{font-size:11px;font-weight:600;font-family:monospace;color:#94A3B8;background:none;border:none;outline:none;width:72px;cursor:text;padding:0}
.order-id-edit:focus{background:#F1F5F9;border-radius:4px;padding:1px 4px;color:#0F172A}
.item-cost{font-size:11px;color:#64748B;text-align:right;min-width:54px}
.item-cost-val{font-weight:600;color:#1E293B}
.item-notes-input{width:100%;font-size:11px;color:#475569;border:none;outline:none;background:transparent;font-family:inherit;resize:none;padding:2px 0;border-bottom:1px solid transparent}
.item-notes-input:focus{border-bottom-color:#6366F1}
.item-notes-row{padding:2px 16px 8px 90px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<input type="file" id="importFileInput" accept=".xlsx,.xls,.csv" style="display:none">
<div id="app"><div class="login-screen"><span class="spinner"></span><div class="login-sub">Loading...</div></div></div>
<script>
// -- CONFIGURATION --
var CLIENT_ID = "7184a05e-f154-4dc8-bb4c-d8e83e9bdce8";
var TENANT_ID = "eeea7e3e-9ccb-4a16-894e-3417c6a7a4c1";
var SITE_URL = "https://met1sol.sharepoint.com/sites/Production";
var ORDERS_LIST = "Orders";
var ITEMS_LIST = "OrderItems";

// -- AUTH STATE --
var msalInstance = null;
var currentAccount = null;
var accessToken = null;
var demoMode = false;

// -- MSAL CONFIG --
var msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: "https://login.microsoftonline.com/" + TENANT_ID,
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
};

function initAuth() {
  if (CLIENT_ID.indexOf("YOUR_") === 0) {
    enterDemoMode();
    return;
  }
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    msalInstance.initialize().then(function() {
      return msalInstance.handleRedirectPromise();
    }).then(function(response) {
      if (response) {
        currentAccount = response.account;
      } else {
        var accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) currentAccount = accounts[0];
      }
      if (currentAccount) {
        getToken()
  .then(function() {
    return loadSettings();
  })
  .then(function() {
    return loadData();
  });
      } else {
        renderLoginScreen();
      }
    }).catch(function(err) {
      console.error("Auth error:", err);
      enterDemoMode();
    });
  } catch (err) {
    console.error("MSAL init error:", err);
    enterDemoMode();
  }
}

function login() {
  msalInstance.loginRedirect({
    scopes: ["https://met1sol.sharepoint.com/AllSites.Write"]
  });
}

function logout() {
  if (msalInstance) msalInstance.logoutRedirect();
}

function getToken() {
  return msalInstance.acquireTokenSilent({
    scopes: ["https://met1sol.sharepoint.com/AllSites.Write"],
    account: currentAccount
  }).then(function(resp) {
    accessToken = resp.accessToken;
  }).catch(function() {
    return msalInstance.acquireTokenRedirect({
      scopes: ["https://met1sol.sharepoint.com/AllSites.Write"]
    });
  });
}

function renderLoginScreen() {
  document.getElementById("app").innerHTML =
    '<div class="login-screen">' +
    '<div style="font-size:40px">&#128230;</div>' +
    '<div class="login-title">Order Tracker</div>' +
    '<div class="login-sub">Sign in with your work account to get started</div>' +
    '<button class="login-btn" onclick="login()">Sign in with Microsoft</button>' +
    '<div style="margin-top:12px"><button class="btn" onclick="enterDemoMode()">Try Demo Mode</button></div>' +
    '</div>';
}

// -- SHAREPOINT REST API --
function spHeaders(method) {
  var h = { "Accept": "application/json;odata=verbose", "Authorization": "Bearer " + accessToken };
  if (method === "POST" || method === "MERGE") h["Content-Type"] = "application/json;odata=verbose";
  return h;
}

function spGetItems(listName) {
  var url = SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')/items?$top=5000";
  return fetch(url, { headers: spHeaders() }).then(function(r) {
    if (!r.ok) throw new Error("Failed: " + r.status);
    return r.json();
  }).then(function(d) { return d.d.results; });
}

function spGetListType(listName) {
  return fetch(SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')", { headers: spHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(d) { return d.d.ListItemEntityTypeFullName; });
}

function spGetListFields(listName) {
  return fetch(SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')/fields?$filter=Hidden eq false and ReadOnlyField eq false", { headers: spHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var fields = d.d.results.map(function(f) { return { title: f.Title, internalName: f.InternalName }; });
      console.log(listName + " FIELDS:", JSON.stringify(fields));
      return fields;
    });
}

function spCreateItem(listName, data) {
  return spGetListType(listName).then(function(itemType) {
    data.__metadata = { type: itemType };
    return fetch(SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')/items", {
      method: "POST", headers: spHeaders("POST"), body: JSON.stringify(data)
    });
  }).then(function(r) {
    if (!r.ok) {
      return r.json().then(function(err) {
        var msg = (err && err.error && err.error.message && err.error.message.value) || ("HTTP " + r.status);
        throw new Error(listName + " create failed: " + msg);
      });
    }
    return r.json();
  });
}

function spUpdateItem(listName, itemId, data) {
  return spGetListType(listName).then(function(itemType) {
    data.__metadata = { type: itemType };
    var h = spHeaders("MERGE");
    h["X-HTTP-Method"] = "MERGE";
    h["If-Match"] = "*";
    return fetch(SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')/items(" + itemId + ")", {
      method: "POST", headers: h, body: JSON.stringify(data)
    });
  });
}

function spDeleteItem(listName, itemId) {
  var h = spHeaders();
  h["X-HTTP-Method"] = "DELETE";
  h["If-Match"] = "*";
  return fetch(SITE_URL + "/_api/web/lists/getbytitle('" + listName + "')/items(" + itemId + ")", {
    method: "POST", headers: h
  });
}

// -- SHAREPOINT IMAGE UPLOAD --
function uploadImageToSP(base64DataUrl, fileName) {
  // Convert base64 data URL to binary
  var parts = base64DataUrl.split(',');
  var mime = parts[0].match(/:(.*?);/)[1];
  var binary = atob(parts[1]);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

  var ext = mime === 'image/png' ? '.png' : '.jpg';
  var safeName = fileName.replace(/[^a-zA-Z0-9_-]/g, '_') + '_' + Date.now() + ext;
  var folderUrl = SITE_URL + "/SiteAssets/OrderImages";
  var uploadUrl = SITE_URL + "/_api/web/GetFolderByServerRelativeUrl('/sites/Production/SiteAssets/OrderImages')/Files/add(url='" + safeName + "',overwrite=true)";

  // First ensure folder exists, then upload
  return ensureFolder(folderUrl).then(function() {
    return fetch(uploadUrl, {
      method: "POST",
      headers: {
        "Accept": "application/json;odata=verbose",
        "Authorization": "Bearer " + accessToken,
        "Content-Length": bytes.length
      },
      body: bytes.buffer
    });
  }).then(function(r) {
    if (!r.ok) throw new Error("Image upload failed: " + r.status);
    return r.json();
  }).then(function(data) {
    // Return the server-relative URL converted to absolute
    var serverRelUrl = data.d.ServerRelativeUrl;
    return SITE_URL.replace("/sites/Production", "") + serverRelUrl;
  });
}

function ensureFolder(folderUrl) {
  // Try to get the folder, create it if it doesn't exist
  return fetch(SITE_URL + "/_api/web/GetFolderByServerRelativeUrl('/sites/Production/SiteAssets/OrderImages')", {
    headers: { "Accept": "application/json;odata=verbose", "Authorization": "Bearer " + accessToken }
  }).then(function(r) {
    if (r.ok) return; // Folder exists
    // Create folder
    return fetch(SITE_URL + "/_api/web/folders", {
      method: "POST",
      headers: {
        "Accept": "application/json;odata=verbose",
        "Content-Type": "application/json;odata=verbose",
        "Authorization": "Bearer " + accessToken
      },
      body: JSON.stringify({ __metadata: { type: "SP.Folder" }, ServerRelativeUrl: "/sites/Production/SiteAssets/OrderImages" })
    });
  });
}

// -- APP STATE --
var state = {
  orders: [], loading: true, error: null, expandedOrder: null,
  view: "active", searchTerm: "", sortBy: "date-desc",
  selectedItems: {},
  selectedOrders: {},
  statuses: ["Pending", "Ordered", "Shipped", "Received"],
  factories: ["Factory A", "Factory B", "Factory C", "Overseas Plant 1", "Overseas Plant 2"],
  modal: null, modalData: {}
};

// -- DATA OPERATIONS --
var demoIdCounter = { order: 4, item: 7 };
function loadSettings() {
  return spGetItems("AppSettings").then(function(items) {
    var statuses = [];
    var factories = [];
    items.forEach(function(i) {
      if (i.Type_x002e_ === "status") statuses.push(i.Value);
      if (i.Type_x002e_ === "factory") factories.push(i.Value);
    });
    if (statuses.length) state.statuses = statuses;
    if (factories.length) state.factories = factories;
    console.log("Loaded settings — statuses:", state.statuses, "factories:", state.factories);
  }).catch(function(err) {
    console.warn("Could not load AppSettings:", err);
  });
}

function loadData() {
  state.loading = true;
  state.error = null;
  render();

  if (demoMode) {
    state.loading = false;
    render();
    return;
  }

  getToken().then(function() {
    spGetListFields(ORDERS_LIST).catch(function(e) {
      console.warn("Could not get Orders fields:", e);
    });

    return Promise.all([
      spGetItems(ORDERS_LIST),
      spGetItems(ITEMS_LIST)
    ]);
  }).then(function(results) {
    var orderRows = results[0],
        itemRows = results[1];

    var itemsByOrder = {};

    itemRows.forEach(function(row) {
      var oid = row.OrderID || row.OrderID0 || row.Title || "";
      if (!itemsByOrder[oid]) itemsByOrder[oid] = [];

      itemsByOrder[oid].push({
        spId: row.Id,
        id: row.Title || row.ItemID || "",
        name: row.ItemName || row.ItemName0 || "",
        description: row.Description || row.Description0 || "",
        brand: row.Brand || row.Brand0 || "",
        masterInner: row.MasterInner || row.Master_Inner || "",
        units: row.Units || row.Units0 || 0,
        cost: row.Cost || row.Cost0 || 0,
        notes: row.Notes || row.Notes0 || "",
        status: row.Status || row.Status0 || state.statuses[0],
        factory: row.Factory || row.Factory0 || "",
        ticketed: row.Ticketed || "",
        image: row.ImageURL || (window._localImages && window._localImages[row.Id]) || null
      });
    });

    state.orders = orderRows.map(function(row) {
      var orderId = row.Title || row.OrderID || "";

      return {
        spId: row.Id,
        id: orderId,
        customer: row.Customer || row.Customer0 || "",
        submittedBy: row.SubmittedBy || row.SubmittedBy0 || "",
        date: (row.Date || row.OrderDate)
          ? (row.Date || row.OrderDate).split("T")[0]
          : "",
        notes: row.Notes || row.Notes0 || row.Notes1 || "",
        archived: !!(row.Archived || row.Archived0),
        archivedDate: (row.ArchivedDate || row.ArchivedDate0)
          ? (row.ArchivedDate || row.ArchivedDate0).split("T")[0]
          : null,
        items: itemsByOrder[orderId] || []
      };
    });

    state.loading = false;
    render();

  }).catch(function(err) {
    state.loading = false;
    state.error = "Could not load from SharePoint. " + err.message;
    console.error(err);
    render();
  });
}

function createOrder(customer, notes) {
  if (demoMode) {
    var id = "ORD-" + String(demoIdCounter.order++).padStart(3, "0");
    state.orders.unshift({ spId: Date.now(), id: id, customer: customer, submittedBy: "User", date: new Date().toISOString().split("T")[0], notes: notes || "", archived: false, archivedDate: null, items: [] });
    state.expandedOrder = id; render(); return;
  }
  var count = state.orders.length + 1;
  var orderId = "ORD-" + String(count).padStart(3, "0");
  // Notes is a reserved SP field - try without it first, then add other fields carefully
  var orderPayload = { Title: orderId, Customer: customer, Date: new Date().toISOString(), Archived: false };
  if (notes && notes.trim()) orderPayload.Notes = notes;

    state.expandedOrder = orderId; loadData();

function createItem(orderId, name, desc, units, brand, masterInner) {
  if (demoMode) {
    var id = "ITM-" + String(demoIdCounter.item++).padStart(3, "0");
    state.orders = state.orders.map(function(o) {
      return o.id === orderId ? Object.assign({}, o, { items: o.items.concat([{ spId: Date.now(), id: id, name: name, description: desc || "", units: units || 0, status: state.statuses[0], image: null, factory: "" }]) }) : o;
    });
    render(); return;
  }
  var ic = state.orders.reduce(function(s, o) { return s + o.items.length; }, 0) + 1;
  spCreateItem(ITEMS_LIST, { Title: "ITM-" + String(ic).padStart(3, "0"), OrderID: orderId, ItemName: name, Description: desc || "", Brand: brand || "", MasterInner: masterInner || "", Units: units || 0, Status: state.statuses[0], Factory: "" }).then(function() { loadData(); });
}

function updateItemData(spId, data) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) {
      return Object.assign({}, o, { items: o.items.map(function(i) {
        if (i.spId !== spId) return i;
        var u = Object.assign({}, i);
        if (data.Units !== undefined) u.units = data.Units;
        if (data.Cost !== undefined) u.cost = data.Cost;
        if (data.Status) u.status = data.Status;
        if (data.Factory !== undefined) u.factory = data.Factory;
        if (data.Notes !== undefined) u.notes = data.Notes;
        return u;
      })});
    });
    render(); return;
  }
  spUpdateItem(ITEMS_LIST, spId, data).then(function() { loadData(); });
}

function deleteItemSP(spId) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) { return Object.assign({}, o, { items: o.items.filter(function(i) { return i.spId !== spId; }) }); });
    render(); return;
  }
  spDeleteItem(ITEMS_LIST, spId).then(function() { loadData(); });
}

function deleteOrderSP(order) {
  if (demoMode) {
    state.orders = state.orders.filter(function(o) { return o.id !== order.id; });
    if (state.expandedOrder === order.id) state.expandedOrder = null;
    render(); return;
  }
  var promises = order.items.map(function(i) { return spDeleteItem(ITEMS_LIST, i.spId); });
  Promise.all(promises).then(function() { return spDeleteItem(ORDERS_LIST, order.spId); }).then(function() { loadData(); });
}

function archiveOrderSP(order) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) { return o.id === order.id ? Object.assign({}, o, { archived: true, archivedDate: new Date().toISOString().split("T")[0] }) : o; });
    state.expandedOrder = null; render(); return;
  }
  spUpdateItem(ORDERS_LIST, order.spId, { Archived: true, ArchivedDate: new Date().toISOString() }).then(function() { state.expandedOrder = null; loadData(); });
}

function restoreOrderSP(order) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) { return o.id === order.id ? Object.assign({}, o, { archived: false, archivedDate: null }) : o; });
    render(); return;
  }
  spUpdateItem(ORDERS_LIST, order.spId, { Archived: false, ArchivedDate: null }).then(function() { loadData(); });
}

function bulkUpdateStatus(newStatus) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) { return Object.assign({}, o, { items: o.items.map(function(i) { return state.selectedItems[i.id] ? Object.assign({}, i, { status: newStatus }) : i; }) }); });
    state.selectedItems = {}; render(); return;
  }
  var promises = [];
  state.orders.forEach(function(o) { o.items.forEach(function(i) { if (state.selectedItems[i.id]) promises.push(spUpdateItem(ITEMS_LIST, i.spId, { Status: newStatus })); }); });
  Promise.all(promises).then(function() { state.selectedItems = {}; loadData(); });
}

function importOrders(ordersData) {
  if (demoMode) {
    ordersData.forEach(function(o) {
      var id = "ORD-" + String(demoIdCounter.order++).padStart(3, "0");
      var items = o.items.map(function(it) { return { spId: Date.now() + Math.random(), id: "ITM-" + String(demoIdCounter.item++).padStart(3, "0"), name: it.name, description: it.description || "", units: it.units || 0, status: state.statuses[0], image: null, factory: "" }; });
      state.orders.unshift({ spId: Date.now(), id: id, customer: o.customer, submittedBy: "User", date: new Date().toISOString().split("T")[0], notes: o.notes || "", archived: false, archivedDate: null, items: items });
    });
    if (state.orders.length) state.expandedOrder = state.orders[0].id;
    render(); return;
  }
  console.log("IMPORT START - ordersData:", JSON.stringify(ordersData.map(function(o){return{customer:o.customer,itemCount:o.items.length};})));
  var itemCounter = state.orders.reduce(function(s, o) { return s + o.items.length; }, 0);
  var chain = Promise.resolve();
  ordersData.forEach(function(o, idx) {
    chain = chain.then(function() {
      var count = state.orders.length + idx + 1;
      var orderId = "ORD-" + String(count).padStart(3, "0");
      var orderPayload = { Title: orderId, Customer: o.customer || "Unknown", Date: new Date().toISOString(), Archived: false };
      if (o.notes && o.notes.trim()) orderPayload.Notes = o.notes;
      if (currentAccount && currentAccount.name) orderPayload.SubmittedBy = currentAccount.name;
      console.log("Creating order:", orderId, "payload:", JSON.stringify(orderPayload));
      return spCreateItem(ORDERS_LIST, orderPayload).then(function(result) {
        console.log("Order CREATED OK:", orderId, "SP ID:", result && result.d && result.d.Id);
        var itemChain = Promise.resolve();
        o.items.forEach(function(item) {
          itemChain = itemChain.then(function() {
            itemCounter++;
            var itemId = "ITM-" + String(itemCounter).padStart(3, "0");
            var imageUploadPromise = item.image && !demoMode
              ? compressImage(item.image, 800, 0.75).then(function(compressed) { return uploadImageToSP(compressed, itemId); })
              : Promise.resolve(null);
            return imageUploadPromise.then(function(imageUrl) {
              var itemPayload = { Title: itemId, OrderID: orderId, ItemName: item.name, Description: item.description || "", Brand: item.brand || "", MasterInner: item.masterInner || "", Units: item.units || 0, Cost: item.cost || 0, Status: item.status || state.statuses[0], Factory: "" };
              if (imageUrl) itemPayload.ImageURL = imageUrl;
              return spCreateItem(ITEMS_LIST, itemPayload);
            }).catch(function(err) {
              console.warn("Image upload failed, creating item without image:", err);
              return spCreateItem(ITEMS_LIST, { Title: itemId, OrderID: orderId, ItemName: item.name, Description: item.description || "", Brand: item.brand || "", MasterInner: item.masterInner || "", Units: item.units || 0, Cost: item.cost || 0, Status: item.status || state.statuses[0], Factory: "" });
            });
          });
        });
        return itemChain;
      }).catch(function(err) {
        console.error("ORDER CREATE FAILED for", orderId, err);
        alert("Order create failed for " + orderId + ": " + err.message);
        throw err;
      });
    });
  });
  chain.then(function() { console.log("IMPORT DONE"); loadData(); }).catch(function(err) { console.error("Import chain failed:", err); });
}

// -- HELPERS --
var SC = ["#F59E0B","#3B82F6","#8B5CF6","#10B981","#EF4444","#EC4899","#14B8A6","#F97316"];
function getStatusColor(s) { var i = state.statuses.indexOf(s); return SC[i >= 0 ? i % SC.length : 0]; }
function deriveOrderStatus(items) {
  if (!items.length) return "Open";
  var last = state.statuses[state.statuses.length - 1];
  if (items.every(function(i) { return i.status === last; })) return "Complete";
  if (items.some(function(i) { return i.status !== state.statuses[0]; })) return "In Progress";
  return "Open";
}
function orderStatusColor(s) { return s === "Complete" ? "#10B981" : s === "In Progress" ? "#3B82F6" : "#F59E0B"; }
function getPrimaryFactory(o) { var c = {}; o.items.forEach(function(i) { if (i.factory) c[i.factory] = (c[i.factory] || 0) + 1; }); var b = "", m = 0; for (var f in c) { if (c[f] > m) { b = f; m = c[f]; } } return b; }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
var FP = { name:[/^item$/i,/item.?name/i,/^style/i,/product/i,/^name$/i,/part/i,/material/i,/sku/i], description:[/desc/i,/detail/i,/spec/i], units:[/^qty$/i,/quant/i,/unit/i,/^amount$/i,/^count$/i,/pcs/i,/available/i,/stock/i], customer:[/customer/i,/client/i,/buyer/i,/company/i], brand:[/^brand$/i,/^brand.?name/i,/^vendor$/i,/^supplier$/i], masterInner:[/master/i,/inner/i,/case.?pack/i,/pack/i], cost:[/^cost$/i,/^price$/i,/^fob$/i,/unit.?cost/i,/cost.?unit/i,/fob.?wh/i], status:[/^status$/i], orderNum:[/^order.?#/i,/^order.?num/i,/^po.?#/i,/^po$/i,/^order$/i] };
function autoMap(cols) { var m = {name:"",description:"",units:"",customer:"",brand:"",masterInner:"",cost:"",status:"",orderNum:""}; var u = {}; for (var f in FP) { for (var p = 0; p < FP[f].length; p++) { for (var c = 0; c < cols.length; c++) { if (FP[f][p].test(cols[c].trim()) && !u[cols[c]]) { m[f] = cols[c]; u[cols[c]] = true; break; } } if (m[f]) break; } } return m; }

function render() {

  var s = state.searchTerm.toLowerCase();

  });
  var sorted = filtered.slice().sort(function(a, b) {
    switch (state.sortBy) {
      case "date-desc": return (b.date || "").localeCompare(a.date || "");

// Extract images from xlsx zip and map to row numbers
function extractImagesFromXlsx(arrayBuffer, json) {
  return new Promise(function(resolve) {
    try {
      var zip = XLSX.utils.cfb_new ? null : null;
      // Use JSZip via XLSX internal zip reader
      var data = new Uint8Array(arrayBuffer);
      // XLSX exposes zip reading — parse the xlsx as a zip manually
      var rowImages = {};
      // Read the zip structure
      var wb = XLSX.read(data, { type: "array", cellDates: true });
      var sheetName = wb.SheetNames[0];

      // Access the raw zip via XLSX's internal structure
      // xlsx stores the cfb/zip as wb.Workbook parent
      // We need to use XLSX.utils to access the zip
      // Try to get the raw bytes and parse as zip
      if (typeof JSZip !== 'undefined') {
        JSZip.loadAsync(arrayBuffer).then(function(zip) {
          var allFiles = Object.keys(zip.files);
          console.log("ZIP files:", allFiles.filter(function(f) { return f.indexOf("drawing") >= 0 || f.indexOf("media") >= 0; }));
          
          var drawingFiles = allFiles.filter(function(f) { return f.match(/xl\/drawings\/drawing\d+\.xml/); });
          console.log("Drawing files found:", drawingFiles);
          if (drawingFiles.length === 0) { console.warn("No drawing files in xlsx"); resolve({}); return; }

          zip.files[drawingFiles[0]].async("string").then(function(xml) {
            // Handles both oneCellAnchor and twoCellAnchor
            var anchors = xml.match(/<xdr:(?:one|two)CellAnchor[^>]*>[\s\S]*?<\/xdr:(?:one|two)CellAnchor>/g) || [];
            console.log("Anchors found:", anchors.length);

            var relFile = drawingFiles[0].replace("drawings/drawing", "drawings/_rels/drawing").replace(".xml", ".xml.rels");
            console.log("Looking for rels file:", relFile);
            if (!zip.files[relFile]) { console.warn("Rels file not found:", relFile); resolve({}); return; }

            zip.files[relFile].async("string").then(function(relsXml) {
              var relMap = {};
              var relMatches = relsXml.match(/Id="([^"]+)"[^>]+Target="([^"]+)"/g) || [];
              relMatches.forEach(function(rel) {
                var id = rel.match(/Id="([^"]+)"/)[1];
                var target = rel.match(/Target="([^"]+)"/)[1];
                relMap[id] = target;
              });
              console.log("Rel map entries:", Object.keys(relMap).length);

              var imagePromises = anchors.map(function(anchor) {
                // Get row from <xdr:from><xdr:row> — first row tag inside anchor
                var fromMatch = anchor.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)<\/xdr:row>/);
                // Get image rId from r:embed attribute
                var rIdMatch = anchor.match(/r:embed="([^"]+)"/);
                if (!fromMatch || !rIdMatch) return Promise.resolve(null);
                var anchorRow = parseInt(fromMatch[1]); // 0-indexed from top of sheet
                // anchorRow 0 = Excel row 1 (header), anchorRow 1 = Excel row 2 (first data row)
                // json index = anchorRow - 1 (since header is row 1 = anchorRow 0)
                var dataRow = anchorRow; // store as anchorRow, match against json index below
                var rId = rIdMatch[1];
                var mediaPath = relMap[rId];
                if (!mediaPath) return Promise.resolve(null);
                var fullPath = "xl/media/" + mediaPath.replace("../media/", "");
                if (!zip.files[fullPath]) { console.warn("Media not found:", fullPath); return Promise.resolve(null); }
                return zip.files[fullPath].async("base64").then(function(b64) {
                  var mime = fullPath.match(/\.png$/i) ? "image/png" : "image/jpeg";
                  return { row: dataRow, src: "data:" + mime + ";base64," + b64 };
                });
              });

              Promise.all(imagePromises).then(function(results) {
                results.forEach(function(r) { if (r) rowImages[r.row] = r.src; });
                console.log("Extracted " + Object.keys(rowImages).length + " images");
                console.log("Image row keys:", Object.keys(rowImages));
                console.log("JSON row count:", json ? json.length : "N/A");
                // Log first few matches
                if (json) json.slice(0,3).forEach(function(r,i) { console.log("json["+i+"] _image:", r._image ? "YES" : "NO", "checking key", i+1, "in rowImages:", !!(rowImages[i+1])); });
                resolve(rowImages);
              });
            }).catch(function(e) { console.error("Rels parse error:", e); resolve({}); });
          }).catch(function(e) { console.error("Drawing parse error:", e); resolve({}); });
        }).catch(function(e) { console.error("JSZip load error:", e); resolve({}); });
      } else {
        resolve({});
      }
    } catch(e) {
      console.warn("Image extraction failed:", e);
      resolve({});
    }
  });
}

function handleImportFile(file) {
  if (!file) return;
  if (/\.(csv|tsv)$/i.test(file.name)) {
    Papa.parse(file, { header: true, skipEmptyLines: true, complete: function(r) { if (r.data && r.data.length) proceedToMap(file.name, Object.keys(r.data[0]), r.data, {}); else { state.modalData.error = "No data"; render(); } }, error: function() { state.modalData.error = "Could not read file"; render(); } });
  } else {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var arrayBuffer = e.target.result;
        var wb = XLSX.read(new Uint8Array(arrayBuffer), { type: "array" });
        var json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
        if (!json.length) { state.modalData.error = "No data"; render(); return; }
        // Try to extract images
        extractImagesFromXlsx(arrayBuffer, json).then(function(rowImages) {
          // Attach images to rows (json index 0 = data row 2)
          json.forEach(function(row, idx) {

// -- IMAGE COMPRESSION --
function compressImage(base64DataUrl, maxWidth, quality) {
  maxWidth = maxWidth || 800;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function() { resolve(base64DataUrl); }; // fallback: return original
    img.src = base64DataUrl;
  });
}

// -- BULK FACTORY UPDATE --
function bulkUpdateFactory(factory) {
  if (demoMode) {
    state.orders = state.orders.map(function(o) {
      return Object.assign({}, o, { items: o.items.map(function(i) {
        return state.selectedItems[i.id] ? Object.assign({}, i, { factory: factory }) : i;
      })});
    });
    state.selectedItems = {}; render(); return;
  }
  var promises = [];
  state.orders.forEach(function(o) {
    o.items.forEach(function(i) {
      if (state.selectedItems[i.id]) promises.push(spUpdateItem(ITEMS_LIST, i.spId, { Factory: factory }));
    });
  });
  Promise.all(promises).then(function() { state.selectedItems = {}; loadData(); });
}

// -- IMAGE POPUP --
function viewItemImage(e, spId) {
  e.stopPropagation();
  // Find image from state
  var src = null;
  state.orders.forEach(function(o) { o.items.forEach(function(i) { if (i.spId === spId) src = i.image; }); });
  if (!src) return;
  var overlay = document.createElement('div');
  overlay.className = 'img-popup-overlay';
  var img = document.createElement('img');
  img.src = src;
  var close = document.createElement('span');
  close.className = 'img-popup-close';
  close.innerHTML = '&times;';
  close.onclick = function() { overlay.remove(); };
  overlay.appendChild(close);
  overlay.appendChild(img);
  overlay.onclick = function(ev) { if (ev.target === overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

// -- IMAGE UPLOAD FOR MANUAL ITEM EDIT --
function handleItemImageUpload(spId, fileInput) {
  var file = fileInput.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    // Compress first
    compressImage(base64, 800, 0.75).then(function(compressed) {
    if (demoMode) {
      state.orders = state.orders.map(function(o) {
        return Object.assign({}, o, { items: o.items.map(function(i) {
          return i.spId === spId ? Object.assign({}, i, { image: compressed }) : i;
        })});
      });
      render(); return;
    }
    var itemId = null;
    state.orders.forEach(function(o) { o.items.forEach(function(i) { if (i.spId === spId) itemId = i.id; }); });
    uploadImageToSP(compressed, itemId || ("item_" + spId)).then(function(imageUrl) {
      return updateItemData(spId, { ImageURL: imageUrl });
    }).then(function() {
      loadData();
    }).catch(function(err) {
      console.error("Image upload failed:", err);
      alert("Image upload failed: " + err.message);
    });
    }); // end compressImage
  };
  reader.readAsDataURL(file);
}

// -- COMMIT ORDER ID --
function commitOrderId(input, spId, oldVal) {
  var v = input.value.trim();
  if (!v || v === oldVal) { input.value = oldVal; return; }
  if (demoMode) {
    state.orders = state.orders.map(function(o) { return o.spId == spId ? Object.assign({}, o, { id: v }) : o; });
    if (state.expandedOrder === oldVal) state.expandedOrder = v;
    render(); return;
  }
  // Find items belonging to this order and update their OrderID too
  var order = state.orders.find(function(o) { return o.spId == spId; });
  var itemUpdates = order ? order.items.map(function(i) { return spUpdateItem(ITEMS_LIST, i.spId, { OrderID: v }); }) : [];
  Promise.all([spUpdateItem(ORDERS_LIST, spId, { Title: v })].concat(itemUpdates)).then(function() {
    if (state.expandedOrder === oldVal) state.expandedOrder = v;
    loadData();
  }).catch(function(err) { alert("Could not update order #: " + err.message); input.value = oldVal; });
}

function buildExportWb(orders) {
  // Load the template workbook which already has yellow bold headers
  var templateBinary = atob(EXPORT_TEMPLATE_B64);
  var bytes = new Uint8Array(templateBinary.length);
  for (var i = 0; i < templateBinary.length; i++) bytes[i] = templateBinary.charCodeAt(i);
  var wb = XLSX.read(bytes, { type: "array", cellStyles: true });
  var ws = wb.Sheets[wb.SheetNames[0]];

  // Clear any existing data rows (keep header row 1)
  var ref = XLSX.utils.decode_range(ws["!ref"] || "A1:J1");
  for (var r = 1; r <= ref.e.r; r++) {
    for (var c = 0; c <= 9; c++) {
      var addr = XLSX.utils.encode_cell({ r: r, c: c });
      delete ws[addr];
    }
  }

  // Center alignment style for data cells
  var centerStyle = { alignment: { horizontal: "center", vertical: "center" } };

  // Write data rows starting at row 2 (index 1)
  var rowIdx = 1;
  orders.forEach(function(order) {
    order.items.forEach(function(item) {
      var master = "", inner = "";
      if (item.masterInner) {
        var parts = item.masterInner.split("/");
        inner = parts[0] ? parts[0].trim() : "";
        master = parts[1] ? parts[1].trim() : "";
      }
      var rowData = [
        item.brand || "",
        item.description || "",
        item.name || "",
        "",
        inner,
        master,
        item.cost || 0,
        item.units || 0,
        order.id || "",
        item.factory || ""
      ];
      rowData.forEach(function(val, c) {
        var addr = XLSX.utils.encode_cell({ r: rowIdx, c: c });
        ws[addr] = { v: val, t: typeof val === "number" ? "n" : "s", s: centerStyle };
      });
      rowIdx++;
    });
  });

  // Update range to include all data rows
  ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: rowIdx - 1, c: 9 } });
  return wb;
}

function exportOrder(orderId) {
  var order = state.orders.find(function(o) { return o.id === orderId; });
  if (!order) return;
  var wb = buildExportWb([order]);
  XLSX.writeFile(wb, (order.id || "order") + "_" + (order.customer || "export").replace(/[^a-zA-Z0-9]/g,"_") + ".xlsx");
}
// -- INIT --
initAuth();
// Attach change handler directly to the persistent file input
var _fileInput = document.getElementById('importFileInput');
if (_fileInput) {
  _fileInput.onchange = function() {
    console.log('File input change fired, files:', this.files);
    if (this.files && this.files[0]) {
      handleImportFile(this.files[0]);
      this.value = '';
    }
  };
}
document.body.addEventListener('drop', function(e) {
  if (e.target && (e.target.id === 'importDropZone' || e.target.closest('#importDropZone'))) {
    e.preventDefault();
    var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) handleImportFile(file);
  }
});
document.body.addEventListener('dragover', function(e) {
  if (e.target && (e.target.id === 'importDropZone' || e.target.closest('#importDropZone'))) {
    e.preventDefault();
  }
});
